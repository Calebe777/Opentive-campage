services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: emailmkt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d emailmkt"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  ms-backend:
    build: ./ms-backend
    env_file: ./ms-backend/.env
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ms-ai:
        condition: service_started
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  ms-ai:
    build: ./ms-ai
    env_file: ./ms-ai/.env
    ports: ["8002:8002"]
  ms-email:
    build: ./ms-email
    env_file: ./ms-email/.env
    ports: ["8001:8001"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ms-backend:
        condition: service_started
      smtp-relay:
        condition: service_started

  smtp-relay:
    image: bytemark/smtp
    restart: unless-stopped
  ms-frontend:
    build: ./ms-frontend
    ports: ["3000:3000"]
    depends_on:
      ms-backend:
        condition: service_started
volumes:
  pgdata:
